<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVSEG Chat - Login</title>
  <script>
    (function () {
      var tema = localStorage.getItem("avseg_tema") || "dark";
      document.documentElement.setAttribute("data-theme", tema);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-brand-vertical">
  <img src="assets/logo-avseg.png" alt="AVSEG" class="login-logo-grande">
  <span>AVSEG Chat</span>
</h1>
        <p>Sistema de Atendimento Interno</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="senha-wrapper">
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
            <button type="button" class="btn-toggle-senha" data-target="senha" aria-label="Mostrar senha">
              <svg class="icone-olho" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div class="login-esqueci-senha">
          <a href="#" id="linkEsqueciSenha">Esqueci minha senha</a>
        </div>

        <div id="erro" class="erro-mensagem" style="display: none;"></div>

        <button type="submit" class="btn-primary" id="btnLogin">
          Entrar
        </button>
      </form>

      <form id="formEsqueciSenha" class="login-form" style="display:none;">
        <div class="form-group">
          <label for="emailRecuperacao">Informe seu email cadastrado</label>
          <input type="email" id="emailRecuperacao" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <p class="login-esqueci-info">Vamos enviar um link de redefinição de senha para esse email, se ele estiver cadastrado.</p>
        <div id="erroRecuperacao" class="erro-mensagem" style="display: none;"></div>
        <div id="sucessoRecuperacao" class="sucesso-mensagem" style="display: none;"></div>
        <button type="submit" class="btn-primary" id="btnEnviarRecuperacao">Enviar link de recuperação</button>
        <button type="button" class="btn-voltar-login" id="btnVoltarLogin">← Voltar para o login</button>
      </form>

      <div class="login-footer">
        <p>🔐 Acesso restrito a atendentes autorizados</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
