<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVSEG Chat - Login</title>
  <script>
    (function () {
      var tema = localStorage.getItem("avseg_tema") || "dark";
      document.documentElement.setAttribute("data-theme", tema);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-brand-vertical">
  <img src="assets/logo-avseg.png" alt="AVSEG" class="login-logo-grande">
  <span>AVSEG Chat</span>
</h1>
        <p>Sistema de Atendimento Interno</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>

        <div id="erro" class="erro-mensagem" style="display: none;"></div>

        <button type="submit" class="btn-primary" id="btnLogin">
          Entrar
        </button>
      </form>

      <div class="login-footer">
        <p>🔐 Acesso restrito a atendentes autorizados</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
